version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: map_backend
    ports:
      - "8000:8000"
    volumes:
      # Mount codebase for live-reloading (if you run uvicorn with --reload)
      - .:/app
      # Hide the host's .venv from the container by creating an anonymous volume over it
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontned
      dockerfile: Dockerfile
    container_name: map_frontend
    ports:
      - "5173:5173"
    volumes:
      # Mount codebase for hot-reloading
      - ./frontned:/app
      # Prevent the host's node_modules from conflicting with the container's linux dependencies
      - /app/node_modules
    depends_on:
      - backend
    environment:
      # Tells Vite to poll for file changes, useful on some host OS configurations (especially Windows with WSL/mounts)
      - CHOKIDAR_USEPOLLING=true
